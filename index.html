<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shu Yerda AI - Dizayn Generator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #image-preview { max-height: 300px; object-fit: contain; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <span class="text-[10px] bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full border border-indigo-500/30 uppercase tracking-widest font-bold">
                <i class="fa-solid fa-circle text-[6px] mr-2 animate-pulse"></i>AI Engine Faol
            </span>
            <h1 class="text-3xl font-black mt-4 gradient-text">SHU YERDA AI</h1>
            <p class="text-gray-400 text-xs mt-1">Professional Marketplace Dizaynlari</p>
        </div>

        <div class="glass-card rounded-3xl p-6 shadow-2xl">
            <div id="upload-container" class="border-2 border-dashed border-indigo-500/40 rounded-2xl p-8 text-center cursor-pointer hover:border-indigo-400 transition-all">
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <div id="preview-box">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl text-indigo-400 mb-3"></i>
                    <p class="text-sm font-medium text-gray-300">Mahsulot rasmini tanlang</p>
                </div>
                <img id="image-preview" class="hidden mx-auto rounded-lg shadow-lg">
            </div>

            <button id="generate-btn" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-indigo-500/20 transition-all disabled:opacity-50">
                Dizaynni Yaratish <i class="fa-solid fa-wand-magic-sparkles ml-2"></i>
            </button>

            <button id="download-btn" class="hidden w-full mt-3 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-emerald-500/20 transition-all text-white">
                Rasmni Saqlash <i class="fa-solid fa-download ml-2"></i>
            </button>
        </div>

        <div id="status-msg" class="mt-4 text-center text-sm text-gray-400 hidden"></div>
    </div>

    <script>
        const API_KEY = 'sk_pr_shu_51c0816c621914607bc68a96fa96f64b760b18cc';
        const fileInput = document.getElementById('file-input');
        const uploadContainer = document.getElementById('upload-container');
        const imagePreview = document.getElementById('image-preview');
        const previewBox = document.getElementById('preview-box');
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        const statusMsg = document.getElementById('status-msg');

        let selectedFile = null;
        let resultUrl = null;

        // File selection
        uploadContainer.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    imagePreview.classList.remove('hidden');
                    previewBox.classList.add('hidden');
                };
                reader.readAsDataURL(selectedFile);
            }
        };

        // Generate Design
        generateBtn.onclick = async () => {
            if (!selectedFile) return alert('Iltimos, avval rasm tanlang!');

            generateBtn.disabled = true;
            generateBtn.innerHTML = 'AI ishlamoqda... <i class="fa-solid fa-spinner animate-spin ml-2"></i>';
            statusMsg.classList.remove('hidden');
            statusMsg.innerText = "Fon tozalanmoqda...";

            const formData = new FormData();
            formData.append('image_file', selectedFile);

            try {
                const response = await fetch('https://sdk.photoroom.com/v1/segment', {
                    method: 'POST',
                    headers: { 'x-api-key': API_KEY },
                    body: formData
                });

                if (!response.ok) throw new Error('API xatosi yuz berdi');

                const blob = await response.blob();
                resultUrl = URL.createObjectURL(blob);
                
                imagePreview.src = resultUrl;
                statusMsg.innerText = "Tabriklaymiz! Dizayn tayyor.";
                
                // Show download button
                downloadBtn.classList.remove('hidden');
                generateBtn.innerHTML = 'Qaytadan yaratish <i class="fa-solid fa-rotate-right ml-2"></i>';
            } catch (err) {
                statusMsg.innerText = "Xatolik: Limit tugagan yoki rasm formati noto'g'ri.";
                console.error(err);
            } finally {
                generateBtn.disabled = false;
            }
        };

        // Download Action
        downloadBtn.onclick = () => {
            if (!resultUrl) return;
            const link = document.createElement('a');
            link.href = resultUrl;
            link.download = `shuyerda-ai-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>

</body>
</html>
