<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHU YERDA AI - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #05070a; --card: #0d111a; --accent: #6366f1; }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif;
            margin: 0; min-height: 100vh;
        }
        /* Sahifalarni boshqarish */
        .hidden-section { display: none !important; }
        
        .bento-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 160px; gap: 1.25rem;
        }
        .card-2x2 { grid-column: span 2; grid-row: span 2; }
        .premium-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.03);
            border-radius: 24px; transition: 0.3s; position: relative; overflow: hidden;
        }
        .premium-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .market-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s; cursor: pointer; color: white;
        }
        .market-btn:hover { background: var(--accent); border-color: var(--accent); }
        
        @media (max-width: 768px) { .bento-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="login-section" class="min-h-[80vh] flex items-center justify-center hidden-section">
        <div class="w-full max-w-md p-10 rounded-[32px] bg-[#0d111a] border border-white/5 text-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl font-black italic">S</div>
            <h1 class="text-2xl font-bold mb-8">Xush kelibsiz</h1>
            <div class="space-y-4 text-left">
                <input type="text" id="user-name" placeholder="Ismingiz" class="w-full p-4 rounded-xl bg-[#161b26] border border-gray-800 text-white outline-none">
                <input type="tel" id="user-phone" placeholder="Telefon raqamingiz" class="w-full p-4 rounded-xl bg-[#161b26] border border-gray-800 text-white outline-none">
                <button onclick="saveLogin()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold uppercase mt-4 hover:bg-indigo-500 transition">KIRISH</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden-section">
        <div id="dashboard-page" class="max-w-6xl mx-auto">
            <header class="flex justify-between items-center mb-10">
                <h2 class="text-xl font-black italic text-indigo-500 uppercase tracking-tighter">SHU YERDA AI</h2>
                <div id="display-user" class="text-[10px] font-bold bg-white/5 px-4 py-2 rounded-full border border-white/10 text-indigo-300"></div>
            </header>

            <div class="bento-grid">
                <div class="premium-card card-2x2 p-8 flex flex-col border-indigo-500/20">
                    <div class="text-4xl mb-4">🎨</div>
                    <h3 class="text-2xl font-black mb-2">Marketplace<br>Infografikasi</h3>
                    <p class="text-gray-500 text-xs mb-8">Platformani tanlang:</p>
                    <div class="grid grid-cols-2 gap-4 mt-auto">
                        <button onclick="goToTool('Uzum Market')" class="market-btn py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest">Uzum</button>
                        <button onclick="goToTool('Wildberries')" class="market-btn py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest">WB</button>
                    </div>
                </div>

                <div class="premium-card p-6 flex flex-col cursor-pointer" onclick="goToTool('Foto Tahrir')">
                    <div class="text-2xl mb-2">🪄</div>
                    <h3 class="font-bold text-[10px] uppercase">Foto Tahrir</h3>
                    <p class="text-gray-500 text-[9px] mt-auto">Fonni o'chirish</p>
                </div>
                <div class="premium-card p-6 flex flex-col cursor-pointer" onclick="goToTool('AI Generatsiya')">
                    <div class="text-2xl mb-2">🚀</div>
                    <h3 class="font-bold text-[10px] uppercase text-emerald-400">AI Rasmlar</h3>
                    <p class="text-gray-500 text-[9px] mt-auto">Noldan yaratish</p>
                </div>
                </div>
        </div>

        <div id="tool-page" class="max-w-4xl mx-auto text-center hidden-section">
            <button onclick="backToDash()" class="mb-10 text-gray-500 flex items-center gap-2 text-[10px] font-bold uppercase"><i class="fa-solid fa-arrow-left"></i> Orqaga</button>
            <h2 id="tool-title" class="text-5xl font-black uppercase italic mb-10 text-indigo-500"></h2>
            <div class="bg-[#0d111a] p-10 rounded-[40px] border border-white/5">
                <div class="border-2 border-dashed border-white/10 rounded-[30px] p-20">
                    <p class="text-gray-400 mb-6">Rasmni yuklang</p>
                    <button class="bg-white text-black px-12 py-4 rounded-2xl font-black text-xs uppercase">Rasm tanlash</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginSec = document.getElementById('login-section');
        const mainContent = document.getElementById('main-content');
        const dashPage = document.getElementById('dashboard-page');
        const toolPage = document.getElementById('tool-page');

        function checkUser() {
            const user = localStorage.getItem('shuyerda_ai_user');
            if (user) {
                loginSec.classList.add('hidden-section');
                mainContent.classList.remove('hidden-section');
                dashPage.classList.remove('hidden-section');
                toolPage.classList.add('hidden-section');
                document.getElementById('display-user').innerText = "ACCOUNT: " + user.toUpperCase();
            } else {
                loginSec.classList.remove('hidden-section');
                mainContent.classList.add('hidden-section');
            }
        }

        function saveLogin() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            if (name && phone) {
                localStorage.setItem('shuyerda_ai_user', name);
                checkUser();
            } else {
                alert("Ism va telefonni kiriting!");
            }
        }

        function goToTool(title) {
            document.getElementById('tool-title').innerText = title;
            dashPage.classList.add('hidden-section');
            toolPage.classList.remove('hidden-section');
        }

        function backToDash() {
            dashPage.classList.remove('hidden-section');
            toolPage.classList.add('hidden-section');
        }

        window.onload = checkUser;
    </script>
</body>
</html>
